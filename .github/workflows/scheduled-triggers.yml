name: Callback Protocol - Scheduled Triggers

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 min: intento 1 + verificación
    - cron: '*/30 * * * *'  # cada 30 min: resumen de pendientes por correo
    - cron: '0 * * * *'     # cada hora: intento 2 (revisa ventana de 2h) + renovación
  workflow_dispatch: {}

jobs:
  reminder-attempt1:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Llamar /api/cron/reminder-attempt1
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/reminder-attempt1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  verify-calls:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Llamar /api/cron/verify-calls
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/verify-calls" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  pending-summary-email:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Llamar /api/cron/pending-summary-email
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/pending-summary-email" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  reminder-attempt2:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Llamar /api/cron/reminder-attempt2
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/reminder-attempt2" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  renew-subscription:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Llamar /api/cron/renew-subscription
        run: |
          curl -sf -X GET "${{ secrets.VERCEL_APP_URL }}/api/cron/renew-subscription" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"